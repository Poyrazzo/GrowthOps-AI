version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: growthops
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "15432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"

  django:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "18000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgres://admin:adminpassword@postgres:5432/growthops
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_HOST=${LANGFUSE_HOST}
      - OUTREACH_EMAIL=${OUTREACH_EMAIL}
      - OUTREACH_APP_PASSWORD=${OUTREACH_APP_PASSWORD}
      - OUTREACH_TEST_MODE=${OUTREACH_TEST_MODE}
      - TEST_REDIRECT_EMAIL=${TEST_REDIRECT_EMAIL}
      - SAVE_GENERIC_EMAIL_LEADS=${SAVE_GENERIC_EMAIL_LEADS:-false}
      - SEARCH_DISCOVERY_ENABLED=${SEARCH_DISCOVERY_ENABLED:-true}
      - SEARCH_PROVIDER=${SEARCH_PROVIDER:-duckduckgo}
      - SEARCH_API_KEY=${SEARCH_API_KEY:-}
      - SEARCH_BASE_URL=${SEARCH_BASE_URL:-}
      - SEARCH_DISCOVERY_RESULT_LIMIT=${SEARCH_DISCOVERY_RESULT_LIMIT:-15}
      - ADSPOWER_API_URL=${ADSPOWER_API_URL:-http://host.docker.internal:50325}
      - ADSPOWER_PROFILE_ID=${ADSPOWER_PROFILE_ID:-}
      - LINKEDIN_ENRICHMENT_ENABLED=${LINKEDIN_ENRICHMENT_ENABLED:-false}
    depends_on:
      - postgres
      - redis

  celery_worker:
    build: ./backend
    command: celery -A core worker -l info
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgres://admin:adminpassword@postgres:5432/growthops
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_HOST=${LANGFUSE_HOST}
      - OUTREACH_EMAIL=${OUTREACH_EMAIL}
      - OUTREACH_APP_PASSWORD=${OUTREACH_APP_PASSWORD}
      - OUTREACH_TEST_MODE=${OUTREACH_TEST_MODE}
      - TEST_REDIRECT_EMAIL=${TEST_REDIRECT_EMAIL}
      - SAVE_GENERIC_EMAIL_LEADS=${SAVE_GENERIC_EMAIL_LEADS:-false}
      - SEARCH_DISCOVERY_ENABLED=${SEARCH_DISCOVERY_ENABLED:-true}
      - SEARCH_PROVIDER=${SEARCH_PROVIDER:-duckduckgo}
      - SEARCH_API_KEY=${SEARCH_API_KEY:-}
      - SEARCH_BASE_URL=${SEARCH_BASE_URL:-}
      - SEARCH_DISCOVERY_RESULT_LIMIT=${SEARCH_DISCOVERY_RESULT_LIMIT:-15}
      - ADSPOWER_API_URL=${ADSPOWER_API_URL:-http://host.docker.internal:50325}
      - ADSPOWER_PROFILE_ID=${ADSPOWER_PROFILE_ID:-}
      - LINKEDIN_ENRICHMENT_ENABLED=${LINKEDIN_ENRICHMENT_ENABLED:-false}
    depends_on:
      - postgres
      - redis

  celery_beat:
    build: ./backend
    command: celery -A core beat -l info
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgres://admin:adminpassword@postgres:5432/growthops
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_HOST=${LANGFUSE_HOST}
      - SAVE_GENERIC_EMAIL_LEADS=${SAVE_GENERIC_EMAIL_LEADS:-false}
      - SEARCH_DISCOVERY_ENABLED=${SEARCH_DISCOVERY_ENABLED:-true}
      - SEARCH_PROVIDER=${SEARCH_PROVIDER:-duckduckgo}
      - SEARCH_API_KEY=${SEARCH_API_KEY:-}
      - SEARCH_BASE_URL=${SEARCH_BASE_URL:-}
      - SEARCH_DISCOVERY_RESULT_LIMIT=${SEARCH_DISCOVERY_RESULT_LIMIT:-15}
      - ADSPOWER_API_URL=${ADSPOWER_API_URL:-http://host.docker.internal:50325}
      - ADSPOWER_PROFILE_ID=${ADSPOWER_PROFILE_ID:-}
      - LINKEDIN_ENRICHMENT_ENABLED=${LINKEDIN_ENRICHMENT_ENABLED:-false}
    depends_on:
      - postgres
      - redis

  playwright_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.playwright
    command: celery -A core worker -l info -Q playwright
    volumes:
      - ./backend:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgres://admin:adminpassword@postgres:5432/growthops
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_HOST=${LANGFUSE_HOST}
      - SAVE_GENERIC_EMAIL_LEADS=${SAVE_GENERIC_EMAIL_LEADS:-false}
      - SEARCH_DISCOVERY_ENABLED=${SEARCH_DISCOVERY_ENABLED:-true}
      - SEARCH_PROVIDER=${SEARCH_PROVIDER:-duckduckgo}
      - SEARCH_API_KEY=${SEARCH_API_KEY:-}
      - SEARCH_BASE_URL=${SEARCH_BASE_URL:-}
      - SEARCH_DISCOVERY_RESULT_LIMIT=${SEARCH_DISCOVERY_RESULT_LIMIT:-15}
      - ADSPOWER_API_URL=${ADSPOWER_API_URL:-http://host.docker.internal:50325}
      - ADSPOWER_PROFILE_ID=${ADSPOWER_PROFILE_ID:-}
      - LINKEDIN_ENRICHMENT_ENABLED=${LINKEDIN_ENRICHMENT_ENABLED:-false}
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      # Browser-side fetches go to the host-mapped Django port (18000), not the in-container 8000
      - NEXT_PUBLIC_API_URL=http://localhost:18000/api/crm

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=UTC
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres

  greenmail:
    image: greenmail/standalone:latest
    ports:
      - "3025:3025" # SMTP
      - "3143:3143" # IMAP
      - "8080:8080" # API
    environment:
      - GREENMAIL_OPTS=-Dgreenmail.setup.test.all -Dgreenmail.hostname=0.0.0.0 -Dgreenmail.auth.disabled

volumes:
  postgres_data:
  n8n_data:
